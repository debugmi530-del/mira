name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34"

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Keystore: $(ls -lh android/debug.keystore)"

      - name: Configure Godot Android SDK paths
        run: |
          mkdir -p ~/.config/godot
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/java_sdk_path = \"$JAVA_HOME\""
            echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
            echo "export/android/debug_keystore = \"$GITHUB_WORKSPACE/android/debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > ~/.config/godot/editor_settings-4.tres
          echo "=== EditorSettings ===" && cat ~/.config/godot/editor_settings-4.tres

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download and install Godot export templates
        run: |
          TDIR=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          mkdir -p "$TDIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TDIR/"
          echo "Templates ($(ls $TDIR | wc -l) files):"
          ls "$TDIR"

      - name: Copy godot-lib.aar for plugin build
        run: |
          TEMPLATES=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          LIBS_DIR=android/plugins/MiraPlugin/libs
          mkdir -p "$LIBS_DIR"
          # Extract android_source.zip to get godot-lib.aar
          mkdir -p /tmp/android_src
          unzip -q "$TEMPLATES/android_source.zip" -d /tmp/android_src
          AAR=$(find /tmp/android_src -name "godot-lib*.aar" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" "$LIBS_DIR/godot-lib.aar"
            echo "Copied: $(basename $AAR)"
          else
            echo "❌ godot-lib.aar not found in android_source.zip"; exit 1
          fi

      - name: Build MiraPlugin AAR
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/android/plugins/MiraPlugin"
          GRADLE_BIN=$(find "$HOME/.gradle" -name "gradle" -executable -path "*/gradle-8.4/bin/gradle" 2>/dev/null | head -1)
          GRADLE_BIN="${GRADLE_BIN:-gradle}"
          echo "Gradle: $GRADLE_BIN"
          "$GRADLE_BIN" --project-dir "$PLUGIN_DIR" assembleRelease --no-daemon 2>&1 | tee /tmp/plugin.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && { tail -30 /tmp/plugin.log; exit $EXIT; }
          AAR=$(find "$PLUGIN_DIR/build/outputs/aar" -name "*.aar" 2>/dev/null | head -1)
          [ -z "$AAR" ] && AAR=$(find "$PLUGIN_DIR" -name "*.aar" ! -path "*/libs/*" 2>/dev/null | head -1)
          [ -z "$AAR" ] && { echo "❌ No AAR produced"; exit 1; }
          cp "$AAR" "$PLUGIN_DIR/MiraPlugin.aar"
          echo "✅ Plugin AAR ready: $(du -sh $PLUGIN_DIR/MiraPlugin.aar)"

      - name: Export APK
        run: |
          mkdir -p build
          echo "=== Pre-export state ==="
          echo "android_debug.apk : $(ls $HOME/.local/share/godot/export_templates/$GODOT_VERSION.stable/android_debug.apk 2>/dev/null | wc -l) file(s)"
          echo "debug.keystore    : $(ls android/debug.keystore 2>/dev/null)"
          echo "MiraPlugin.aar    : $(ls android/plugins/MiraPlugin/MiraPlugin.aar 2>/dev/null)"
          echo "export_presets.cfg: $(head -5 export_presets.cfg)"
          echo ""
          godot --headless --path . --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk 2>&1 | grep -v "^$" | grep -v "Class '.*' is not exposed"
          echo ""
          if [ -f "build/${{ env.EXPORT_NAME }}.apk" ]; then
            echo "✅ SUCCESS: $(du -sh build/${{ env.EXPORT_NAME }}.apk)"
          else
            echo "❌ APK not produced"
            echo "=== EditorSettings after Godot run ==="
            cat ~/.config/godot/editor_settings-4.tres | grep -A5 "android"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: hashFiles(format('build/{0}.apk', env.EXPORT_NAME)) != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: "Автосборка #${{ github.run_number }}. Разрешите установку из неизвестных источников."
          files: build/${{ env.EXPORT_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
