name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira
  PROJECT_DIR: "."

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.2.8568313" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          mkdir -p $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Configure Godot Android SDK paths
        run: |
          # Godot headless ignores env vars — SDK paths must be in EditorSettings
          mkdir -p ~/.config/godot
          python3 - << 'PYEOF'
          import os, pathlib
          settings = pathlib.Path(os.path.expanduser("~/.config/godot/editor_settings-4.tres"))
          java_home = os.environ.get("JAVA_HOME", "")
          android_home = os.environ.get("ANDROID_HOME", "/usr/local/lib/android/sdk")
          workspace = os.environ.get("GITHUB_WORKSPACE", os.getcwd())
          keystore = f"{workspace}/android/debug.keystore"
          content = f'''[gd_resource type="EditorSettings" format=3]

[resource]
export/android/java_sdk_path = "{java_home}"
export/android/android_sdk_path = "{android_home}"
export/android/debug_keystore = "{keystore}"
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
'''
          settings.write_text(content)
          print("✅ Editor settings written:")
          print(content)
          PYEOF

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install Android build template into project
        run: |
          mkdir -p android/build
          godot --headless --path . --import --quit 2>/dev/null || true
          find android -name "*.import" -delete 2>/dev/null || true
          TEMPLATES=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          if [ -f "$TEMPLATES/android_source.zip" ]; then
            unzip -q "$TEMPLATES/android_source.zip" -d android/build/
            echo "✅ Android build template extracted"
            echo "=== .build_version ==="
            cat android/build/.build_version 2>/dev/null || echo "(not found)"
            echo "=== android/build/ top-level ==="
            ls android/build/ | head -20
          else
            echo "❌ android_source.zip not found in templates"
            ls "$TEMPLATES/"
            exit 1
          fi

      - name: Copy godot-lib.aar from build template into plugin libs
        run: |
          LIBS_DIR=android/plugins/MiraPlugin/libs
          mkdir -p "$LIBS_DIR"
          AAR=$(find android/build -name "godot-lib*.aar" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" "$LIBS_DIR/godot-lib.aar"
            echo "✅ Copied $(basename $AAR) → $LIBS_DIR/godot-lib.aar"
          else
            echo "Searching for any .aar in build template:"
            find android/build -name "*.aar" || echo "none"
            echo "❌ godot-lib.aar not found inside android_source.zip"
            exit 1
          fi

      - name: Build plugin AAR
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/android/plugins/MiraPlugin"

          GRADLE_BIN=$(find "${RUNNER_TEMP:-/home/runner/work/_temp}" \
            -name "gradle" -executable -path "*/gradle-8.4/bin/gradle" 2>/dev/null | head -1)
          if [ -z "$GRADLE_BIN" ]; then
            GRADLE_BIN=$(find "$HOME" \
              -name "gradle" -executable -path "*/gradle-8.4/bin/gradle" 2>/dev/null | head -1)
          fi
          if [ -z "$GRADLE_BIN" ]; then
            GRADLE_BIN="gradle"
          fi
          echo "Using Gradle: $GRADLE_BIN"

          "$GRADLE_BIN" \
            --project-dir "$PLUGIN_DIR" \
            assembleRelease \
            --no-daemon \
            --stacktrace \
            2>&1 | tee /tmp/gradle-build.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            tail -60 /tmp/gradle-build.log
            exit $EXIT
          fi

          # FIX: AGP 8.x outputs to build/outputs/aar/ with filename suffix -release.aar
          # NOT inside a "release" subdirectory (old pattern "*/release/*" was wrong)
          AAR=$(find "$PLUGIN_DIR/build/outputs/aar" -name "*.aar" 2>/dev/null | head -1)
          if [ -z "$AAR" ]; then
            AAR=$(find "$PLUGIN_DIR" -name "*.aar" ! -path "*/libs/*" 2>/dev/null | head -1)
          fi
          if [ -n "$AAR" ]; then
            cp "$AAR" "$PLUGIN_DIR/MiraPlugin.aar"
            echo "✅ Plugin AAR: $AAR → MiraPlugin.aar"
          else
            echo "❌ No AAR produced by Gradle"
            exit 1
          fi

          # FIX: .gdignore only in PLUGIN build output — NOT in android/build/ (Godot template)
          # Putting .gdignore in android/build/ would hide the build template from Godot!
          touch "$PLUGIN_DIR/build/.gdignore"
          echo "✅ .gdignore added to plugin build output (prevents Godot scanning intermediates)"
          echo "ℹ️  android/build/ remains visible so Godot can find the build template"

      - name: Build APK
        run: |
          mkdir -p build
          echo "=== Godot config check ==="
          cat ~/.config/godot/editor_settings-4.tres
          echo "=== android/build template ==="
          ls android/build/ | head -10
          cat android/build/.build_version 2>/dev/null || echo "(no .build_version)"
          echo "=== Running Godot export ==="
          godot --headless --path . --verbose --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk 2>&1 \
            | grep -v "^EditorFileSystem\|^reimport\|import took\|step [0-9]" \
            | tee /tmp/godot-export.log
          EXIT=${PIPESTATUS[0]}
          if [ ! -f "build/${{ env.EXPORT_NAME }}.apk" ] || [ $EXIT -ne 0 ]; then
            echo "=== EXPORT FAILED — searching for specific errors ==="
            grep -i "error\|fail\|invalid\|missing\|configuration" /tmp/godot-export.log | head -30
            exit 1
          fi
          echo "✅ APK size: $(du -sh build/${{ env.EXPORT_NAME }}.apk)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && hashFiles(format('build/{0}.apk', env.EXPORT_NAME)) != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: |
            Автосборка #${{ github.run_number }}

            Скачайте APK ниже и установите на Android устройство.
            Перед установкой разрешите установку из неизвестных источников.
          files: build/${{ env.EXPORT_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
