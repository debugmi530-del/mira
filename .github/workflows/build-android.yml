name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira
  PROJECT_DIR: mira-game

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.2.8568313" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Copy godot-lib.aar into plugin libs
        run: |
          TEMPLATES=~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          LIBS_DIR=${{ env.PROJECT_DIR }}/android/plugins/MiraPlugin/libs
          mkdir -p "$LIBS_DIR"
          # Godot 4.3 ships godot-lib.release.aar and godot-lib.debug.aar in the templates
          if [ -f "$TEMPLATES/godot-lib.release.aar" ]; then
            cp "$TEMPLATES/godot-lib.release.aar" "$LIBS_DIR/godot-lib.aar"
            echo "✅ Copied godot-lib.release.aar"
          elif [ -f "$TEMPLATES/godot-lib.debug.aar" ]; then
            cp "$TEMPLATES/godot-lib.debug.aar" "$LIBS_DIR/godot-lib.aar"
            echo "✅ Copied godot-lib.debug.aar"
          else
            echo "Available template files:"
            ls "$TEMPLATES/"
            echo "❌ godot-lib.aar not found in templates"
            exit 1
          fi

      - name: Generate debug keystore
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/android
          keytool -genkey -v \
            -keystore ${{ env.PROJECT_DIR }}/android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install Android build template into project
        run: |
          cd ${{ env.PROJECT_DIR }}
          mkdir -p android/build
          godot --headless --path . --import --quit 2>/dev/null || true
          if [ -f ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/android_source.zip ]; then
            unzip -q ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/android_source.zip -d android/build/
            echo "✅ Android build template extracted"
          else
            echo "❌ android_source.zip not found"
            exit 1
          fi

      - name: Build plugin AAR
        run: |
          cd ${{ env.PROJECT_DIR }}/android/plugins/MiraPlugin
          # Generate Gradle wrapper if missing
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.0 --distribution-type bin
          fi
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -40
          # Copy produced AAR where Godot expects it
          AAR=$(find . -name "*.aar" -path "*/release/*" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" MiraPlugin.aar
            echo "✅ Plugin AAR built: $AAR"
          else
            echo "❌ No AAR produced by Gradle"
            exit 1
          fi

      - name: Copy plugin AAR into android/build libs
        run: |
          LIBS_DIR=${{ env.PROJECT_DIR }}/android/build/libs
          mkdir -p "$LIBS_DIR"
          cp ${{ env.PROJECT_DIR }}/android/plugins/MiraPlugin/MiraPlugin.aar "$LIBS_DIR/"
          echo "✅ MiraPlugin.aar copied to android/build/libs/"

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          mkdir -p build
          godot --headless --path . --verbose --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: ${{ env.PROJECT_DIR }}/build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && hashFiles(format('{0}/build/{1}.apk', env.PROJECT_DIR, env.EXPORT_NAME)) != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: |
            Автосборка #${{ github.run_number }}

            Скачайте APK ниже и установите на Android устройство.
            Перед установкой разрешите установку из неизвестных источников.
          files: ${{ env.PROJECT_DIR }}/build/${{ env.EXPORT_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
