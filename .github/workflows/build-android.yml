name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira
  PROJECT_DIR: mira-game

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.0"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.2.8568313" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          mkdir -p $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Generate debug keystore
        run: |
          mkdir -p ${{ env.PROJECT_DIR }}/android
          keytool -genkey -v \
            -keystore ${{ env.PROJECT_DIR }}/android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install Android build template into project
        run: |
          cd ${{ env.PROJECT_DIR }}
          mkdir -p android/build
          godot --headless --path . --import --quit 2>/dev/null || true
          TEMPLATES=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          if [ -f "$TEMPLATES/android_source.zip" ]; then
            unzip -q "$TEMPLATES/android_source.zip" -d android/build/
            echo "✅ Android build template extracted"
            echo "Files in android/build (first 20):"
            find android/build -maxdepth 3 | head -20
          else
            echo "❌ android_source.zip not found in templates"
            ls "$TEMPLATES/"
            exit 1
          fi

      - name: Copy godot-lib.aar from build template into plugin libs
        run: |
          # godot-lib*.aar lives INSIDE android_source.zip → android/build/
          LIBS_DIR=${{ env.PROJECT_DIR }}/android/plugins/MiraPlugin/libs
          mkdir -p "$LIBS_DIR"
          AAR=$(find ${{ env.PROJECT_DIR }}/android/build -name "godot-lib*.aar" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" "$LIBS_DIR/godot-lib.aar"
            echo "✅ Copied $(basename $AAR) → plugin/libs/godot-lib.aar"
          else
            echo "Searching for any .aar in build template:"
            find ${{ env.PROJECT_DIR }}/android/build -name "*.aar" || echo "none"
            echo "❌ godot-lib.aar not found inside android_source.zip"
            exit 1
          fi

      - name: Build plugin AAR
        run: |
          set -o pipefail
          cd ${{ env.PROJECT_DIR }}/android/plugins/MiraPlugin
          gradle wrapper --gradle-version 8.0 --distribution-type bin
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tail -60
          AAR=$(find . -name "*.aar" -path "*/release/*" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" MiraPlugin.aar
            echo "✅ Plugin AAR built: $AAR"
          else
            echo "❌ No AAR produced by Gradle"
            exit 1
          fi

      - name: Build APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          mkdir -p build
          godot --headless --path . --verbose --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: ${{ env.PROJECT_DIR }}/build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && hashFiles(format('{0}/build/{1}.apk', env.PROJECT_DIR, env.EXPORT_NAME)) != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: |
            Автосборка #${{ github.run_number }}

            Скачайте APK ниже и установите на Android устройство.
            Перед установкой разрешите установку из неизвестных источников.
          files: ${{ env.PROJECT_DIR }}/build/${{ env.EXPORT_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
