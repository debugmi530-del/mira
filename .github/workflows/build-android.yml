name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.2.8568313" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Keystore generated"

      - name: Install Android build template into project
        run: |
          # firebelley/godot-export does NOT install the gradle build template
          # for use_gradle_build=true projects — we must do it here first.
          mkdir -p $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/* $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

          mkdir -p android/build
          TEMPLATES=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q "$TEMPLATES/android_source.zip" -d android/build/
          echo "✅ Gradle build template extracted"

          # .build_version must match VERSION_FULL_CONFIG inside Godot binary.
          # Use the full version string (with hash) to ensure exact match.
          # We'll patch it after running Godot once to get the exact string.
          # For now write the known value; firebelley action will overwrite
          # EditorSettings but not .build_version — so we must set it correctly.
          echo -n "4.3.stable.official" > android/build/.build_version
          echo "✅ .build_version = $(cat android/build/.build_version)"

      - name: Copy godot-lib.aar from build template into plugin libs
        run: |
          LIBS_DIR=android/plugins/MiraPlugin/libs
          mkdir -p "$LIBS_DIR"
          AAR=$(find android/build -name "godot-lib*.aar" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" "$LIBS_DIR/godot-lib.aar"
            echo "✅ godot-lib.aar copied"
          else
            find android/build -name "*.aar" | head -5 || echo "no aar"
            echo "❌ godot-lib.aar not found"
            exit 1
          fi

      - name: Build plugin AAR
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/android/plugins/MiraPlugin"
          GRADLE_BIN=$(find "${RUNNER_TEMP:-/home/runner/work/_temp}" "$HOME" \
            -name "gradle" -executable -path "*/gradle-8.4/bin/gradle" 2>/dev/null | head -1)
          GRADLE_BIN="${GRADLE_BIN:-gradle}"

          "$GRADLE_BIN" --project-dir "$PLUGIN_DIR" assembleRelease --no-daemon 2>&1 | tee /tmp/plugin-build.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && { tail -40 /tmp/plugin-build.log; exit $EXIT; }

          AAR=$(find "$PLUGIN_DIR/build/outputs/aar" -name "*.aar" 2>/dev/null | head -1)
          [ -z "$AAR" ] && AAR=$(find "$PLUGIN_DIR" -name "*.aar" ! -path "*/libs/*" 2>/dev/null | head -1)
          [ -z "$AAR" ] && { echo "❌ No AAR found"; exit 1; }
          cp "$AAR" "$PLUGIN_DIR/MiraPlugin.aar"
          echo "✅ Plugin AAR: MiraPlugin.aar"

          # Ignore PLUGIN build output only — android/build/ must stay visible
          touch "$PLUGIN_DIR/build/.gdignore"

      - name: Export Android APK
        id: export
        uses: firebelley/godot-export@v6
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          relative_export_path: "./build"
          relative_project_path: "."
          export_debug: true
          cache: false
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Check APK produced
        run: |
          APK=$(find build -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            echo "✅ APK: $(du -sh $APK)"
          else
            echo "❌ No APK found in build/"
            ls -la build/ || echo "(empty)"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/${{ env.EXPORT_NAME }}.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && hashFiles('build/*.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: |
            Автосборка #${{ github.run_number }}

            Скачайте APK и установите на Android.
            Разрешите установку из неизвестных источников.
          files: build/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
