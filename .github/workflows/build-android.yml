name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & NDK
        run: |
          sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34" "ndk;23.2.8568313" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: Configure Godot Android SDK paths
        run: |
          mkdir -p ~/.config/godot
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo ''
            echo '[resource]'
            echo "export/android/java_sdk_path = \"$JAVA_HOME\""
            echo "export/android/android_sdk_path = \"$ANDROID_HOME\""
            echo "export/android/debug_keystore = \"$GITHUB_WORKSPACE/android/debug.keystore\""
            echo 'export/android/debug_keystore_user = "androiddebugkey"'
            echo 'export/android/debug_keystore_pass = "android"'
          } > ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Keystore: $(ls -la android/debug.keystore)"

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          mkdir -p $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          echo "Templates: $(ls $HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/ | wc -l) files"

      - name: Install Android build template into project
        run: |
          mkdir -p android/build
          TEMPLATES=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q "$TEMPLATES/android_source.zip" -d android/build/
          echo "✅ Template extracted"

          # Write .build_version — Godot editor does this on install; android_source.zip does NOT include it
          GODOT_VER=$(godot --headless --version 2>&1 | head -1 | sed 's/Godot Engine v//; s/ -.*//')
          printf '%s' "$GODOT_VER" > android/build/.build_version
          echo "✅ .build_version = $(cat android/build/.build_version)"

      - name: Copy godot-lib.aar from build template into plugin libs
        run: |
          LIBS_DIR=android/plugins/MiraPlugin/libs
          mkdir -p "$LIBS_DIR"
          AAR=$(find android/build -name "godot-lib*.aar" | head -1)
          if [ -n "$AAR" ]; then
            cp "$AAR" "$LIBS_DIR/godot-lib.aar"
            echo "✅ Copied $(basename $AAR)"
          else
            find android/build -name "*.aar" | head -5 || echo "no .aar found"
            echo "❌ godot-lib.aar not found"; exit 1
          fi

      - name: Build plugin AAR
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/android/plugins/MiraPlugin"
          GRADLE_BIN=$(find "${RUNNER_TEMP:-/home/runner/work/_temp}" "$HOME" \
            -name "gradle" -executable -path "*/gradle-8.4/bin/gradle" 2>/dev/null | head -1)
          GRADLE_BIN="${GRADLE_BIN:-gradle}"
          echo "Gradle: $GRADLE_BIN"

          "$GRADLE_BIN" --project-dir "$PLUGIN_DIR" assembleRelease --no-daemon 2>&1 | tee /tmp/plugin-build.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && { tail -40 /tmp/plugin-build.log; exit $EXIT; }

          AAR=$(find "$PLUGIN_DIR/build/outputs/aar" -name "*.aar" 2>/dev/null | head -1)
          [ -z "$AAR" ] && AAR=$(find "$PLUGIN_DIR" -name "*.aar" ! -path "*/libs/*" 2>/dev/null | head -1)
          [ -z "$AAR" ] && { echo "❌ No AAR found"; exit 1; }
          cp "$AAR" "$PLUGIN_DIR/MiraPlugin.aar"
          echo "✅ Plugin AAR → MiraPlugin.aar"
          touch "$PLUGIN_DIR/build/.gdignore"

      - name: Build APK
        run: |
          mkdir -p build
          echo "=== Pre-export checks ==="
          echo "Keystore : $(ls android/debug.keystore 2>/dev/null && echo OK || echo MISSING)"
          echo "build_ver: $(cat android/build/.build_version 2>/dev/null || echo MISSING)"
          echo "Plugin   : $(ls android/plugins/MiraPlugin/MiraPlugin.aar 2>/dev/null && echo OK || echo MISSING)"
          echo "=== Full Godot export output ==="
          godot --headless --path . --verbose --export-debug "Android" build/${{ env.EXPORT_NAME }}.apk 2>&1 \
            | grep -v "Class '.*' is not exposed" \
            | tee /tmp/godot-export.log
          if [ -f "build/${{ env.EXPORT_NAME }}.apk" ]; then
            echo "✅ APK: $(du -sh build/${{ env.EXPORT_NAME }}.apk)"
          else
            echo "❌ APK not produced"
            grep -i "error\|fail\|invalid\|missing\|cannot\|required\|mismatch" /tmp/godot-export.log | head -30
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && hashFiles(format('build/{0}.apk', env.EXPORT_NAME)) != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: |
            Автосборка #${{ github.run_number }}

            Скачайте APK и установите на Android.
            Разрешите установку из неизвестных источников.
          files: build/${{ env.EXPORT_NAME }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
