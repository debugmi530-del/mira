name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34"

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Keystore: $(ls -lh $GITHUB_WORKSPACE/android/debug.keystore)"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          {
            printf '[gd_resource type="EditorSettings" format=3]\n'
            printf '\n'
            printf '[resource]\n'
            printf 'export/android/java_sdk_path = "%s"\n' "$JAVA_HOME"
            printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_HOME"
            printf 'export/android/debug_keystore = "%s"\n' "$GITHUB_WORKSPACE/android/debug.keystore"
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } > ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Patch export_presets.cfg with absolute keystore paths
        run: |
          KS="$GITHUB_WORKSPACE/android/debug.keystore"
          sed -i \
            -e "s|keystore/debug=\"res://android/debug.keystore\"|keystore/debug=\"$KS\"|g" \
            -e "s|keystore/release=\"res://android/debug.keystore\"|keystore/release=\"$KS\"|g" \
            export_presets.cfg
          echo "Patched keystore lines:"
          grep "keystore" export_presets.cfg

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        run: |
          TDIR=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          mkdir -p "$TDIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TDIR/"
          echo "android_debug.apk  : $(ls $TDIR/android_debug.apk 2>/dev/null && echo OK || echo MISSING)"
          echo "android_release.apk: $(ls $TDIR/android_release.apk 2>/dev/null && echo OK || echo MISSING)"

      - name: Extract godot-lib.aar for plugin build
        run: |
          TDIR=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          mkdir -p android/plugins/MiraPlugin/libs
          mkdir -p /tmp/android_src
          unzip -q "$TDIR/android_source.zip" -d /tmp/android_src
          AAR=$(find /tmp/android_src -name "godot-lib*.aar" | head -1)
          [ -z "$AAR" ] && { echo "godot-lib.aar not found"; exit 1; }
          cp "$AAR" android/plugins/MiraPlugin/libs/godot-lib.aar
          echo "Copied: $(basename $AAR)"

      - name: Build MiraPlugin AAR
        run: |
          PLUGIN_DIR="$GITHUB_WORKSPACE/android/plugins/MiraPlugin"
          GRADLE_BIN=$(find "$HOME/.gradle" -name "gradle" -executable -path "*/gradle-8.4/bin/gradle" 2>/dev/null | head -1)
          GRADLE_BIN="${GRADLE_BIN:-gradle}"
          "$GRADLE_BIN" --project-dir "$PLUGIN_DIR" assembleRelease --no-daemon 2>&1 | tee /tmp/plugin.log
          EXIT=${PIPESTATUS[0]}
          [ $EXIT -ne 0 ] && { tail -30 /tmp/plugin.log; exit $EXIT; }
          AAR=$(find "$PLUGIN_DIR/build/outputs/aar" -name "*.aar" 2>/dev/null | head -1)
          [ -z "$AAR" ] && AAR=$(find "$PLUGIN_DIR" -name "*.aar" ! -path "*/libs/*" 2>/dev/null | head -1)
          [ -z "$AAR" ] && { echo "No AAR produced"; exit 1; }
          cp "$AAR" "$PLUGIN_DIR/MiraPlugin.aar"
          touch "$PLUGIN_DIR/build/.gdignore"
          echo "Plugin AAR: $(du -sh $PLUGIN_DIR/MiraPlugin.aar)"

      - name: Export APK
        run: |
          mkdir -p build
          echo "=== Pre-export ==="
          echo "android_debug.apk: OK=$(ls $HOME/.local/share/godot/export_templates/$GODOT_VERSION.stable/android_debug.apk 2>/dev/null && echo yes || echo no)"
          echo "debug.keystore   : $(ls $GITHUB_WORKSPACE/android/debug.keystore 2>/dev/null && echo OK || echo MISSING)"
          echo "MiraPlugin.aar   : $(ls android/plugins/MiraPlugin/MiraPlugin.aar 2>/dev/null && echo OK || echo MISSING)"
          grep "keystore" export_presets.cfg | head -6
          echo ""
          godot --headless --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" "$GITHUB_WORKSPACE/build/${{ env.EXPORT_NAME }}.apk" 2>&1 \
            | grep -v "Class '.*' is not exposed"
          echo ""
          if [ -f "build/${{ env.EXPORT_NAME }}.apk" ]; then
            echo "SUCCESS: $(du -sh build/${{ env.EXPORT_NAME }}.apk)"
          else
            echo "FAILED: APK not produced"
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-debug-apk
          path: build/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: hashFiles(format('build/{0}.apk', env.EXPORT_NAME)) != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "Мира v${{ github.run_number }}"
          body: "Автосборка #${{ github.run_number }}. Разрешите установку из неизвестных источников."
          files: build/${{ env.EXPORT_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
