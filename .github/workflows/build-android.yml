name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: mira

jobs:
  export-android:
    name: Android Export
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-34"

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkey -v \
            -keystore "$GITHUB_WORKSPACE/android/debug.keystore" \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          {
            printf '[gd_resource type="EditorSettings" format=3]\n'
            printf '\n'
            printf '[resource]\n'
            printf 'export/android/java_sdk_path = "%s"\n' "$JAVA_HOME"
            printf 'export/android/android_sdk_path = "%s"\n' "$ANDROID_HOME"
            printf 'export/android/debug_keystore = "%s"\n' "$GITHUB_WORKSPACE/android/debug.keystore"
            printf 'export/android/debug_keystore_user = "androiddebugkey"\n'
            printf 'export/android/debug_keystore_pass = "android"\n'
          } > ~/.config/godot/editor_settings-4.tres

      - name: Patch export_presets.cfg with absolute keystore paths
        run: |
          KS="$GITHUB_WORKSPACE/android/debug.keystore"
          sed -i \
            -e "s|keystore/debug=\"res://android/debug.keystore\"|keystore/debug=\"$KS\"|g" \
            -e "s|keystore/release=\"res://android/debug.keystore\"|keystore/release=\"$KS\"|g" \
            export_presets.cfg

      - name: Download Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Godot export templates
        run: |
          TDIR=$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          mkdir -p "$TDIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$TDIR/"

      - name: DIAGNOSTIC - Test export WITHOUT plugin (gdap hidden)
        run: |
          mkdir -p build
          echo "=== Test WITHOUT plugin ==="
          mv android/plugins/MiraPlugin/MiraPlugin.gdap android/plugins/MiraPlugin/MiraPlugin.gdap.bak
          godot --headless --path "$GITHUB_WORKSPACE" \
            --export-debug "Android" "$GITHUB_WORKSPACE/build/test_no_plugin.apk" 2>&1 \
            | grep -v "Class '.*' is not exposed"
          if [ -f "build/test_no_plugin.apk" ]; then
            echo "SUCCESS_NO_PLUGIN: plugin was the cause!"
          else
            echo "FAILED_NO_PLUGIN: plugin is NOT the cause"
          fi
          mv android/plugins/MiraPlugin/MiraPlugin.gdap.bak android/plugins/MiraPlugin/MiraPlugin.gdap

      - name: DIAGNOSTIC - Print aapt2 and adb existence
        run: |
          echo "aapt2: $(ls $ANDROID_HOME/build-tools/34.0.0/aapt2 2>/dev/null && echo OK || echo MISSING)"
          echo "adb  : $(ls $ANDROID_HOME/platform-tools/adb 2>/dev/null && echo OK || echo MISSING)"
          echo "Platforms: $(ls $ANDROID_HOME/platforms/)"
          echo "Build-tools: $(ls $ANDROID_HOME/build-tools/)"
